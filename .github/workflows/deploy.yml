name: Build & Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'bot.py'
      - 'secrets_loader.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'cogs/**'
      - 'utils/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'discord-bot/bot' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          IMAGE: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          set -euo pipefail

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy ${{ github.sha }}" \
            --parameters commands="[
              \"set -eux\",
              \"sed -i 's|^BOT_IMAGE=.*|BOT_IMAGE=$IMAGE|' /home/ec2-user/.bot.env\",
              \"cd /home/ec2-user/bot\",
              \"sudo -u ec2-user docker compose pull\",
              \"sudo -u ec2-user docker compose up -d --remove-orphans\",
              \"sudo -u ec2-user docker image prune -f\"
            ]" \
            --query Command.CommandId --output text)

          echo "Command ID: $CMD_ID"

          if ! aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"; then
            echo "::error::Deploy failed"
            aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"
            exit 1
          fi
